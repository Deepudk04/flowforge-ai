services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    ports:
      - "5432:5432"
    volumes:
      - flowforge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    environment:
      SERVICE_NAME: FlowForge AI Service
      ENVIRONMENT: local
      LOG_LEVEL: INFO
      LLM_PROVIDER: mock
      DEFAULT_MODEL: flowforge-local-mock
      EMBEDDING_PROVIDER: mock
      EMBEDDING_MODEL: flowforge-local-embedding
      RETRIEVAL_BACKEND: memory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/flowforge
      DATABASE_USERNAME: flowforge
      DATABASE_PASSWORD: flowforge
      FRONTEND_ORIGIN: http://localhost:5173
      AI_SERVICE_BASE_URL: http://ai-service:8000
      FLOWFORGE_SECURITY_ENABLED: false
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  flowforge-postgres:
