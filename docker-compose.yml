services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
    ports:
      - "5432:5432"
    volumes:
      - flowforge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/flowforge
      DATABASE_USERNAME: flowforge
      DATABASE_PASSWORD: flowforge
      FRONTEND_ORIGIN: http://localhost:5173
      AI_SERVICE_BASE_URL: http://host.docker.internal:8000
      FLOWFORGE_SECURITY_ENABLED: false
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  flowforge-postgres: