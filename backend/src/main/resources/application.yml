server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: flowforge-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flowforge}
    username: ${DATABASE_USERNAME:flowforge}
    password: ${DATABASE_PASSWORD:flowforge}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/issuer}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

flowforge:
  api-base-path: /api/v1
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  security:
    enabled: ${FLOWFORGE_SECURITY_ENABLED:false}
    audience: ${JWT_AUDIENCE:flowforge-api}
  ai-service:
    mode: ${AI_SERVICE_MODE:http}
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    timeout-ms: ${AI_SERVICE_TIMEOUT_MS:30000}
    retry-attempts: ${AI_SERVICE_RETRY_ATTEMPTS:3}
    retry-backoff-ms: ${AI_SERVICE_RETRY_BACKOFF_MS:250}
